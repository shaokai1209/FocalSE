$include:
  - conf/base_feat_denoise.yml
  - conf/training.yml
  - conf/training_500k.yml
  - conf/dataset_EARS_clean_16k_my.yml

## Load pre-trained stage1 model
#pretrained_path: "/home/shaokai/NoiseRobustVRVQ-main/stage1/CBR_16k_1250bps/best"
pretrained_path: "/home/shaokai/NoiseRobustVRVQ-main/stage1/CBR_16k_625bps/best"

## depr.
train_with_clean: true

DAC_VRVQ_FeatureDenoise.clean_train: true ## if false, self.freeze_non_denoising_blocks()
DAC_VRVQ_FeatureDenoise.denoise_block_idx: [4] ## Denoising block after this encoder block index
DAC_VRVQ_FeatureDenoise.model_type: "CBR"

# Quantization
DAC_VRVQ_FeatureDenoise.n_codebooks: 2
DAC_VRVQ_FeatureDenoise.codebook_size: 1024
#DAC_VRVQ_FeatureDenoise.n_codebooks: 16
#DAC_VRVQ_FeatureDenoise.codebook_size: 4096
DAC_VRVQ_FeatureDenoise.codebook_dim: 8
DAC_VRVQ_FeatureDenoise.quantizer_dropout: 0.2

#DAC_VRVQ_FeatureDenoise.n_denoise_layers: 10
#DAC_VRVQ_FeatureDenoise.denoise_proj_channels: 128 ## Dimension for Mamba


DAC_VRVQ_FeatureDenoise.noise_cls_in_channels: 1024
DAC_VRVQ_FeatureDenoise.noise_cls_num_classes: 50
DAC_VRVQ_FeatureDenoise.noise_cls_dropout: 0.1


lambdas: ## For generator. 
  mel/loss: 15.0
  adv/feat_loss: 2.0
  adv/gen_loss: 1.0
  vq/commitment_loss: 0.25
  vq/codebook_loss: 1.0
  enc_feat/feat_loss: 0.2
  noise_feat/feat_loss: 0.2
  ce/noise_loss: 0.1
  semantic/res_loss: 0.1
